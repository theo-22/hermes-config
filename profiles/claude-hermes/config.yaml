max_live_sessions: 8
agent:
  max_turns: 40
  gateway_timeout: 1200
  api_max_retries: 3
  tool_use_enforcement: auto
  task_completion_guidance: true
  parallel_tool_call_guidance: true
  environment_probe: true
  verify_on_stop: false
  gateway_timeout_warning: 600
  clarify_timeout: 300
  gateway_notify_interval: 180
  image_input_mode: auto
  disabled_toolsets: []
  verbose: false
terminal:
  backend: local
  cwd: /Users/ted/Hermes
  timeout: 180
  daemon_term_grace_seconds: 2
  home_mode: auto
  auto_source_bashrc: true
  persistent_shell: true
web:
  backend: ''
  search_backend: ''
  extract_backend: ''
display:
  compact: false
  interface: cli
  streaming: true
  show_cost: true
  skin: default
  language: en
  platforms:
    telegram:
      streaming: true
privacy:
  redact_pii: false
context:
  engine: compressor
memory:
  memory_enabled: true
  user_profile_enabled: true
  write_approval: false
  memory_char_limit: 15000
  user_char_limit: 4000
  provider: holographic
  flush_min_turns: 3
  nudge_interval: 5
delegation:
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: true
  subagent_auto_approve: false
skills:
  external_dirs:
    - /Users/ted/Skills
  template_vars: true
  write_approval: false
  creation_nudge_interval: 15
curator:
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  stale_after_days: 30
  archive_after_days: 90
  consolidate: false
  prune_builtins: true
telegram:
  reactions: false
  allowed_chats:
    - '-5183620298'
  extra:
    rich_messages: true
    rich_drafts: false
approvals:
  mode: auto
  timeout: 60
  cron_mode: auto
  destructive_slash_confirm: false
cron:
  wrap_response: true
  mirror_delivery: false
  output_retention: 50
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
gateway:
  scale_to_zero:
    idle_timeout_minutes: 5
  max_inbound_media_bytes: 134217728
  enabled_platforms: '["telegram"]'
sessions:
  auto_prune: false
  retention_days: 180
  vacuum_after_prune: true
  min_interval_hours: 24
onboarding:
  seen:
    busy_input_prompt: true
  profile_build: skip
_config_version: 30
group_sessions_per_user: true
mcp_servers:
  open-brain:
    connect_timeout: 60
    headers:
      Content-Type: application/json
    timeout: 60
    transport: http
    url: https://wgaigjtcwobmanjwerei.supabase.co/functions/v1/open-brain-mcp?key=SeZa4B78mJhf7jej0dQnANby6fX_rPm8a9ePo3A0wyE
platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - kanban
    - memory
    - messaging
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web
  telegram:
    - hermes-telegram
plugins:
  disabled: []
  enabled:
    - openai
cwd: /Users/ted/Hermes
platforms: '{"telegram":{"enabled":true}}'

# ── Security ──────────────────────────────────────────────────────────
# Secret redaction is ON by default — strings that look like API keys,
# tokens, and passwords are masked in tool output, logs, and chat
# responses before the model or user ever sees them. Set redact_secrets
# to false to disable (e.g. when developing the redactor itself).
# tirith pre-exec scanning is enabled by default when the tirith binary
# is available. Configure via security.tirith_* keys or env vars
# (TIRITH_ENABLED, TIRITH_BIN, TIRITH_TIMEOUT, TIRITH_FAIL_OPEN).
#
# security:
#   redact_secrets: true
#   tirith_enabled: true
#   tirith_path: "tirith"
#   tirith_timeout: 5
#   tirith_fail_open: true

# ── Fallback Model ────────────────────────────────────────────────────
# Automatic provider failover when primary is unavailable.
# Uncomment and configure to enable. Triggers on rate limits (429),
# overload (529), service errors (503), or connection failures.
#
# Supported providers:
#   openrouter   (OPENROUTER_API_KEY)  — routes to any model
#   openai-codex (OAuth — hermes auth) — OpenAI Codex
#   nous         (OAuth — hermes auth) — Nous Portal
#   zai          (ZAI_API_KEY)         — Z.AI / GLM
#   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
#   kimi-coding-cn (KIMI_CN_API_KEY)   — Kimi / Moonshot (China)
#   minimax      (MINIMAX_API_KEY)     — MiniMax
#   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
#   bedrock      (AWS IAM / boto3)     — AWS Bedrock (Converse API)
#
# For custom OpenAI-compatible endpoints, add base_url and key_env.
#
# fallback_model:
#   provider: openrouter
#   model: anthropic/claude-sonnet-4
