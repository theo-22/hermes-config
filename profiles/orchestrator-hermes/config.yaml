_config_version: 33
agent:
  api_max_retries: 3
  clarify_timeout: 600
  coding_context: auto
  disabled_toolsets: []
  environment_hint: ''
  environment_probe: true
  gateway_auto_continue_freshness: 3600
  gateway_notify_interval: 180
  gateway_timeout: 1200
  gateway_timeout_warning: 900
  image_input_mode: auto
  max_turns: 40
  parallel_tool_call_guidance: true
  reasoning_effort: high
  restart_drain_timeout: 180
  service_tier: ''
  task_completion_guidance: true
  tool_use_enforcement: auto
  verbose: false
  verify_on_stop: false
browser:
  allow_private_urls: true
  command_timeout: 45
  dialog_policy: must_respond
  dialog_timeout_s: 300
  engine: none
  inactivity_timeout: 180
  record_sessions: false
checkpoints:
  auto_prune: true
  delete_orphans: true
  enabled: true
  max_file_size_mb: 10
  max_snapshots: 10
  max_total_size_mb: 200
  min_interval_hours: 24
  retention_days: 7
code_execution:
  max_tool_calls: 50
  mode: project
  timeout: 300
compression:
  abort_on_summary_failure: false
  enabled: true
  hygiene_hard_message_limit: 600
  in_place: false
  protect_first_n: 5
  protect_last_n: 15
  target_ratio: 0.3
  threshold: 0.7
context:
  engine: compressor
cron:
  mirror_delivery: false
  output_retention: 50
  provider: ''
  wrap_response: true
curator:
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5
  consolidate: false
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  prune_builtins: true
  stale_after_days: 30
delegation:
  api_key: ''
  api_mode: ''
  base_url: ''
  child_timeout_seconds: 600
  inherit_mcp_toolsets: true
  max_concurrent_children: 3
  max_iterations: 50
  max_spawn_depth: 1
  model: ''
  orchestrator_enabled: true
  provider: ''
  reasoning_effort: ''
  subagent_auto_approve: false
display:
  background_process_notifications: all
  bell_on_complete: false
  busy_ack_detail: true
  busy_input_mode: interrupt
  cleanup_progress: false
  cli_refresh_interval: 1
  compact: false
  copy_shortcut: auto
  credits_notices: true
  ephemeral_system_ttl: 0
  file_mutation_verifier: true
  final_response_markdown: strip
  inline_diffs: true
  interface: cli
  interim_assistant_messages: true
  language: en
  long_running_notifications: true
  memory_notifications: 'on'
  persist_prompts: true
  persistent_output: true
  persistent_output_max_lines: 200
  personality: helpful
  pet:
    enabled: false
    render_mode: auto
    scale: 0.33
    slug: ''
    unicode_cols: 0
  reasoning_full: false
  reasoning_style: code
  resume_display: full
  resume_exchanges: 10
  resume_max_assistant_chars: 200
  resume_max_assistant_lines: 3
  resume_max_user_chars: 300
  resume_skip_tool_only: true
  show_cost: true
  show_reasoning: false
  skin: default
  streaming: true
  timestamps: false
  tool_preview_length: 0
  tool_progress: all
  tool_progress_command: false
  tool_progress_grouping: accumulate
  turn_completion_explainer: true
  user_message_preview:
    first_lines: 2
    last_lines: 2
file_read_max_chars: 100000
gateway:
  api_server:
    enabled: true
    max_concurrent_runs: 10
    port: 8644
  max_inbound_media_bytes: 134217728
  media_delivery_allow_dirs: []
  message_timestamps:
    enabled: false
  scale_to_zero:
    idle_timeout_minutes: 5
  strict: false
  trust_recent_files: true
  trust_recent_files_seconds: 600
goals:
  max_turns: 20
group_sessions_per_user: true
human_delay:
  max_ms: 2500
  min_ms: 800
  mode: 'off'
logging:
  backup_count: 3
  level: INFO
  max_size_mb: 5
max_live_sessions: 4
mcp_discovery_timeout: 1.5
memory:
  flush_min_turns: 3
  memory_char_limit: 15000
  memory_enabled: true
  nudge_interval: 5
  provider: holographic
  user_char_limit: 4000
  user_profile_enabled: true
  write_approval: false
model:
  base_url: https://api.deepseek.com
  default: deepseek-v4-flash
  provider: deepseek
model_catalog:
  enabled: true
  ttl_hours: 1
  url: https://hermes-agent.nousresearch.com/docs/api/model-catalog.json
network:
  force_ipv4: false
onboarding:
  profile_build: ask
  seen:
    busy_input_prompt: true
paste_collapse_char_threshold: 2000
paste_collapse_threshold: 12
paste_collapse_threshold_fallback: 5
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - vision
  - web
prefill_messages_file: ''
privacy:
  redact_pii: false
providers:
  deepseek:
    api_key: [REDACTED]
secrets:
  bitwarden:
    access_token_env: BWS_ACCESS_TOKEN
    auto_install: true
    cache_ttl_seconds: 300
    enabled: false
    override_existing: true
    project_id: ''
    server_url: ''
session_reset:
  at_hour: 4
  idle_minutes: 1440
  mode: both
sessions:
  auto_prune: false
  min_interval_hours: 24
  retention_days: 180
  vacuum_after_prune: true
  write_json_snapshots: false
skills:
  creation_nudge_interval: 15
  disabled: []
  external_dirs:
  - /Users/ted/Skills
  guard_agent_created: false
  inline_shell: false
  inline_shell_timeout: 10
  template_vars: true
  write_approval: false
streaming:
  buffer_threshold: 24
  cursor: " \u2589"
  edit_interval: 0.8
  enabled: true
  fresh_final_after_seconds: 60
  transport: auto
terminal:
  auto_source_bashrc: true
  backend: local
  cwd: /Users/ted/.hermes/profiles/orchestrator-hermes/
  daemon_term_grace_seconds: 2
  env_passthrough: []
  home_mode: auto
  lifetime_seconds: 300
  persistent_shell: true
  shell_init_files: []
  timeout: 180
timezone: America/New_York
tool_loop_guardrails:
  hard_stop_after:
    exact_failure: 5
    idempotent_no_progress: 5
    same_tool_failure: 8
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    idempotent_no_progress: 2
    same_tool_failure: 3
  warnings_enabled: true
tool_output:
  max_bytes: 100000
  max_line_length: 2000
  max_lines: 5000
tools:
  tool_search:
    enabled: auto
    max_search_limit: 20
    search_default_limit: 5
    threshold_pct: 10
toolsets:
- hermes-cli
updates:
  backup_keep: 5
  non_interactive_local_changes: stash
  pre_update_backup: false
web:
  backend: ''
  extract_backend: ''
  search_backend: ''
